services:
  - type: web
    name: inventory-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGINS
        value: '["https://YOUR-NETLIFY-APP.netlify.app"]'

databases:
  - name: inventory-db
    plan: free